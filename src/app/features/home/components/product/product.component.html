<section class="py-10  ">
    <div class="container">
            <app-section-title
        [firstPart]="'Featured '" [secondPart]="'Products'"></app-section-title>
<div class=" grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
    @for (product of productlist(); track product._id) {
           <div
          class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow duration-300 group font-sans"
        >
          <div class="relative overflow-hidden mb-4">
            <img
              [src]="product.imageCover"
              [alt]="product.title"
              class="w-full h-auto object-contain"
            />

            <!--  ! ----------- Icons  Heart ! ----------- ....  -->
            <div class="absolute top-2 right-2 flex flex-col gap-2">
              <button
                class="w-10 h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-secondary hover:text-white transition-all"
              >
                <i class="far fa-heart"></i>
              </button>

              <button
                class="w-10 h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-secondary hover:text-white transition-all"
              >
                <i class="fas fa-sync-alt"></i>
              </button>

              <button
              [routerLink]="['/details',product._id,product.slug]"
                
                class="w-10 cursor-pointer h-10 bg-white shadow-sm border border-gray-100 rounded-full flex items-center justify-center text-gray-600 hover:bg-secondary hover:text-white transition-all"
              >
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="space-y-1">
            <p class="text-xs text-gray-400 tracking-wide"> {{product.category.name}}</p>

            <h3
              class="text-xl font-medium  text-secondary cursor-pointer transition-colors"
            >
             {{product.title.split(' ').slice(0, 3).join(' ')}}
            </h3>

            <div class="flex items-center gap-1 pt-2">
              <div class="flex text-yellow-400 text-xs gap-0.5">
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="far fa-star text-gray-300"></i>
              </div>
              <span class="text-xs text-gray-400 font-medium">
                {{product.ratingsAverage}} ({{product.ratingsQuantity}})</span
              >
            </div>

            <div class="flex items-center justify-between pt-2">
              <div class="flex flex-col">
                <span class="text-lg font-medium text-slate-900"> {{product.price}}  EGP</span>
              </div>

              <button
  (click)="addProductToCart(product._id)"
  class="w-10 h-10 bg-secondary cursor-pointer text-white rounded-lg flex items-center justify-center hover:bg-amber-700 transition-colors shadow-sm active:scale-95 disabled:bg-amber-600"
  [disabled]="addedProducts().includes(product._id)"
>
  @if (addedProducts().includes(product._id)) {
    <i class="fas fa-check animate-fade-in"></i>
  } @else {
    <i class="fas fa-plus"></i>
  }
</button>
            </div>
          </div>
        </div>
    }


</div>
    </div>

</section>
